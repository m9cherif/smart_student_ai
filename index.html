
<!DOCTYPE html>
<html>
<head>
<title>Smart Student AI</title>
</head>

<body>

<h1>Smart Student AI Website Works!</h1>

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Login with Google</button>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDzSzUdnba1x2FnuOa-Qee9H5bY52cT3j4",
  authDomain: "smart-student-ai.firebaseapp.com",
  projectId: "smart-student-ai",
  storageBucket: "smart-student-ai.firebasestorage.app",
  messagingSenderId: "378407423860",
  appId: "1:378407423860:web:90f99336c2d5bc1996a621",
  measurementId: "G-EG78EM4ZZK"
};

firebase.initializeApp(firebaseConfig);

function register(){
let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().createUserWithEmailAndPassword(email,password)
.then(()=>{
alert("Account created")
})
.catch((error)=>{
alert(error.message)
})
}

function login(){
let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)
.then(()=>{
alert("Welcome")
})
.catch((error)=>{
alert(error.message)
})
}

function googleLogin(){
var provider=new firebase.auth.GoogleAuthProvider()

firebase.auth().signInWithPopup(provider)
.then((result)=>{
alert("Welcome "+result.user.displayName)
})
.catch((error)=>{
alert(error.message)
})
}
</script>

</body>
</html>
