<!DOCTYPE html>
<html>

<head>
<title>Smart Student AI</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#2563eb;
}
.google{
    background:#ef4444;
}
.logout{
    background:#10b981;
}
</style>
</head>

<body>

<div class="card">

<h2>Smart Student AI</h2>

<div id="loginBox">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button class="google" onclick="googleLogin()">Login with Google</button>
<button class="google" onclick="anonymousLogin()">Login Anonymously</button>

</div>
<div style="width:100%; height:600px; border:0;">
    <iframe src="smartstudentai.mystrikingly.com" 
            style="width:100%; height:100%; border:none;">
    </iframe>
</div>
<div id="userBox" style="display:none">

<h3 id="username"></h3>
<button class="logout" onclick="logout()">Logout</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyDzSzUdnba1x2FnuOa-Qee9H5bY52cT3j4",
authDomain: "smart-student-ai.firebaseapp.com",
projectId: "smart-student-ai",
storageBucket: "smart-student-ai.firebasestorage.app",
messagingSenderId: "378407423860", 
appId: "1:378407423860:web:90f99336c2d5bc1996a621",
measurementId: "G-EG78EM4ZZK"};
firebase.initializeApp(firebaseConfig);
firebase.initializeApp(firebaseConfig);

// دوال تسجيل البريد/كلمة المرور
function emailInput(){ return document.getElementById("email").value.trim(); }
function passwordInput(){ return document.getElementById("password").value.trim(); }

function register(){
    const email = emailInput();
    const password = passwordInput();
    if(!email || !password){ alert("Enter email and password"); return; }
    firebase.auth().createUserWithEmailAndPassword(email,password)
        .then(user => console.log("Registered:", user))
        .catch(e => alert(e.message));
}

function login(){
    const email = emailInput();
    const password = passwordInput();
    if(!email || !password){ alert("Enter email and password"); return; }
    firebase.auth().signInWithEmailAndPassword(email,password)
        .then(user => console.log("Logged in:", user))
        .catch(e => alert(e.message));
}

// تسجيل Google
function googleLogin(){
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
        .catch(e => alert(e.message));
}

// تسجيل مجهول
function anonymousLogin(){
    firebase.auth().signInAnonymously()
        .catch(e => alert(e.message));
}

// تسجيل الخروج
function logout(){ firebase.auth().signOut(); }

// التعامل مع حالة المستخدم
firebase.auth().onAuthStateChanged(user=>{
    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("userBox").style.display="block";
        document.getElementById("username").innerText = user.isAnonymous 
            ? "Welcome Anonymous User" 
            : "Welcome " + user.email;
    } else {
        document.getElementById("loginBox").style.display="block";
        document.getElementById("userBox").style.display="none";
    }
});
</script>

</body>
</html>
